<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成語小達人 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --primary: #FF6B35;
  --secondary: #4ECDC4;
  --accent: #FFE66D;
  --correct: #2ECC71;
  --wrong: #E74C3C;
  --text: #2D3436;
  --text-light: #636E72;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
  --radius: 20px;
  --gold: #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
  --story: #6C5CE7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
.deco { position:fixed; border-radius:50%; opacity:.12; pointer-events:none; z-index:0; }
.deco-1 { width:300px;height:300px;background:var(--primary);top:-80px;left:-80px; }
.deco-2 { width:200px;height:200px;background:var(--secondary);bottom:-60px;right:-40px; }
.deco-3 { width:150px;height:150px;background:var(--accent);top:40%;right:-50px; }
.container { max-width:640px; margin:0 auto; padding:24px 16px 40px; position:relative; z-index:1; }

/* START */
.start-screen { text-align:center; padding:40px 20px; animation:fadeUp .6s ease; }
.start-screen h1 { font-size:2.6rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#E84393); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.start-screen .subtitle { font-size:1.05rem; color:var(--text-light); margin-bottom:28px; }
.mascot { font-size:4.5rem; display:block; margin-bottom:18px; animation:bounce 2s infinite; }
.name-input-area { max-width:320px; margin:0 auto 24px; }
.name-input-area label { display:block; font-size:.9rem; font-weight:700; color:var(--text-light); margin-bottom:8px; text-align:left; }
.name-input { width:100%; padding:14px 18px; border:3px solid #E8E8E8; border-radius:14px; font-family:inherit; font-size:1.1rem; font-weight:700; color:var(--text); background:#fff; outline:none; transition:border-color .2s; }
.name-input:focus { border-color:var(--primary); }
.name-input::placeholder { color:#CCC; font-weight:400; }
.mode-select { display:flex; flex-direction:column; gap:12px; max-width:320px; margin:0 auto; }
.mode-btn { padding:15px 24px; border:none; border-radius:16px; font-family:inherit; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:10px; justify-content:center; }
.mode-btn:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
.mode-btn:disabled { opacity:.5; cursor:not-allowed; transform:none !important; box-shadow:none !important; }
.mode-btn.primary { background:var(--primary); color:#fff; }
.mode-btn.secondary { background:var(--secondary); color:#fff; }
.mode-btn.story-mode { background:var(--story); color:#fff; }
.mode-btn.ghost { background:transparent; border:3px solid #E8E8E8; color:var(--text); font-size:.95rem; }
.mode-btn.ghost:hover { border-color:var(--primary); color:var(--primary); }
.divider { display:flex; align-items:center; gap:12px; margin:20px auto; max-width:320px; color:#CCC; font-size:.85rem; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:#E0E0E0; }

/* PROGRESS */
.progress-area { margin-bottom:18px; }
.progress-info { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:.9rem; font-weight:700; color:var(--text-light); }
.progress-bar { height:12px; background:#E8E8E8; border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--secondary),var(--primary)); border-radius:99px; transition:width .4s ease; }
.score-badge { background:var(--accent); color:var(--text); padding:4px 14px; border-radius:99px; font-weight:900; font-size:.95rem; }
.player-tag { font-size:.85rem; color:var(--primary); font-weight:700; margin-bottom:8px; display:block; }

/* QUESTION */
.question-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px 22px; animation:fadeUp .4s ease; }
.q-number { display:inline-block; background:var(--primary); color:#fff; font-weight:900; font-size:.85rem; padding:4px 14px; border-radius:99px; margin-bottom:14px; }
.q-text { font-size:1.2rem; font-weight:700; line-height:1.7; margin-bottom:22px; min-height:56px; }
.q-text .blank { display:inline-block; border-bottom:3px dashed var(--primary); min-width:90px; text-align:center; color:var(--primary); font-weight:900; padding:0 4px; }
.options { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
.opt-btn { padding:13px 10px; border:3px solid #E8E8E8; border-radius:14px; background:#fff; font-family:inherit; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all .2s; }
.opt-btn:hover:not(.disabled) { border-color:var(--primary); transform:scale(1.03); }
.opt-btn.correct { border-color:var(--correct); background:#D4EDDA; animation:pop .3s ease; }
.opt-btn.wrong { border-color:var(--wrong); background:#FDECEA; animation:shake .4s ease; }
.opt-btn.disabled { cursor:default; opacity:.7; }
.opt-btn.show-answer { border-color:var(--correct); background:#D4EDDA; }
.feedback { margin-top:18px; padding:14px; border-radius:14px; font-size:.93rem; line-height:1.6; animation:fadeUp .3s ease; }
.feedback.correct { background:#D4EDDA; color:#155724; }
.feedback.wrong { background:#FDECEA; color:#721C24; }
.feedback .fb-icon { font-size:1.3rem; margin-right:5px; }
.fb-story { margin-top:10px; padding:12px; background:rgba(108,92,231,.08); border-radius:10px; border-left:4px solid var(--story); font-size:.88rem; line-height:1.6; color:var(--text); }
.fb-story strong { color:var(--story); }
.next-btn { display:block; width:100%; margin-top:16px; padding:13px; border:none; border-radius:14px; background:var(--primary); color:#fff; font-family:inherit; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all .2s; }
.next-btn:hover { background:#E85A28; transform:translateY(-2px); }

/* BACK */
.back-home-btn { display:inline-flex; align-items:center; gap:6px; background:none; border:none; font-family:inherit; font-size:.95rem; font-weight:700; color:var(--text-light); cursor:pointer; padding:8px 14px; border-radius:12px; transition:all .2s; margin-bottom:12px; }
.back-home-btn:hover { background:rgba(0,0,0,.06); color:var(--primary); }
.back-home-btn svg { width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round; }

/* OVERLAY */
.overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:center; justify-content:center; animation:fadeIn .2s ease; }
.overlay.hidden { display:none !important; }
.overlay-box { background:#fff; border-radius:20px; padding:30px 26px 22px; max-width:320px; width:90%; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.15); animation:fadeUp .3s ease; }
.overlay-box p { font-size:1.05rem; font-weight:700; line-height:1.7; margin-bottom:20px; color:var(--text); }
.overlay-actions { display:flex; gap:10px; }
.ov-btn { flex:1; padding:12px 8px; border:none; border-radius:12px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; }
.ov-btn.cancel { background:#E8E8E8; color:var(--text); }
.ov-btn.cancel:hover { background:#D5D5D5; }
.ov-btn.confirm { background:var(--primary); color:#fff; }
.ov-btn.confirm:hover { background:#E85A28; }

/* RESULT */
.result-screen { text-align:center; padding:36px 20px; animation:fadeUp .5s ease; }
.result-screen .big-emoji { font-size:4.5rem; display:block; margin-bottom:12px; }
.result-screen h2 { font-size:1.8rem; font-weight:900; margin-bottom:6px; }
.result-screen .score-text { font-size:1.2rem; color:var(--text-light); margin-bottom:24px; }
.result-screen .score-text strong { color:var(--primary); font-size:2rem; }
.star-row { font-size:2.2rem; margin-bottom:16px; letter-spacing:5px; }
.review-section { text-align:left; margin-top:28px; }
.review-section h3 { font-size:1rem; margin-bottom:12px; color:var(--text-light); }
.review-item { background:var(--card); border-radius:14px; padding:12px 16px; margin-bottom:8px; box-shadow:0 2px 8px rgba(0,0,0,.05); display:flex; align-items:flex-start; gap:10px; }
.review-item .ri-icon { font-size:1.2rem; margin-top:2px; }
.review-item .ri-text { font-size:.9rem; line-height:1.5; }
.review-item .ri-text strong { color:var(--primary); }

/* LEADERBOARD */
.leaderboard-screen { padding:36px 20px; animation:fadeUp .5s ease; }
.leaderboard-screen h2 { text-align:center; font-size:1.8rem; font-weight:900; margin-bottom:6px; }
.lb-subtitle { text-align:center; color:var(--text-light); font-size:.95rem; margin-bottom:24px; }
.lb-row { display:flex; align-items:center; gap:12px; padding:14px 18px; margin-bottom:8px; background:var(--card); border-radius:16px; box-shadow:0 2px 10px rgba(0,0,0,.05); }
.lb-row.top1 { border:2px solid var(--gold); background:linear-gradient(135deg,#FFFDF0,#FFF8E1); }
.lb-row.top2 { border:2px solid var(--silver); background:linear-gradient(135deg,#FAFAFA,#F0F0F0); }
.lb-row.top3 { border:2px solid var(--bronze); background:linear-gradient(135deg,#FFF8F0,#FCEBD8); }
.lb-rank { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1rem; flex-shrink:0; }
.lb-rank.r1 { background:var(--gold); color:#7A5C00; }
.lb-rank.r2 { background:var(--silver); color:#555; }
.lb-rank.r3 { background:var(--bronze); color:#fff; }
.lb-rank.rn { background:#E8E8E8; color:var(--text-light); }
.lb-info { flex:1; }
.lb-name { font-weight:900; font-size:1.05rem; }
.lb-detail { font-size:.8rem; color:var(--text-light); margin-top:2px; }
.lb-score { font-weight:900; font-size:1.2rem; color:var(--primary); }
.lb-score small { font-size:.75rem; color:var(--text-light); font-weight:400; }
.lb-empty { text-align:center; padding:40px 20px; color:var(--text-light); font-size:1rem; }
.lb-empty-icon { font-size:3rem; display:block; margin-bottom:12px; }
.lb-actions { display:flex; flex-direction:column; gap:10px; max-width:320px; margin:24px auto 0; }
.clear-lb-btn { margin-top:10px; background:none; border:none; color:var(--wrong); font-family:inherit; font-size:.85rem; cursor:pointer; font-weight:700; padding:8px; }
.clear-lb-btn:hover { text-decoration:underline; }

/* ===== STORY ENCYCLOPEDIA ===== */
.story-screen { padding:20px 0; animation:fadeUp .5s ease; }
.story-screen h2 { text-align:center; font-size:1.8rem; font-weight:900; margin-bottom:4px; }
.story-subtitle { text-align:center; color:var(--text-light); font-size:.95rem; margin-bottom:20px; }
.story-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; }
.story-nav-btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--story); color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.story-nav-btn:hover { transform:scale(1.1); }
.story-nav-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; }
.story-nav-btn svg { width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round; }
.story-counter { font-weight:900; font-size:1rem; color:var(--text-light); min-width:80px; text-align:center; }

.story-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 24px;
  animation: fadeUp .35s ease;
  border-top: 5px solid var(--story);
}
.story-card .sc-idiom {
  font-size: 2rem;
  font-weight: 900;
  color: var(--story);
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: 4px;
}
.story-card .sc-section {
  margin-bottom: 16px;
}
.story-card .sc-label {
  font-size: .8rem;
  font-weight: 900;
  color: #fff;
  display: inline-block;
  padding: 3px 12px;
  border-radius: 99px;
  margin-bottom: 8px;
}
.sc-label.meaning-label { background: var(--primary); }
.sc-label.story-label { background: var(--story); }
.sc-label.example-label { background: var(--secondary); }
.story-card .sc-content {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--text);
  padding-left: 4px;
}
.story-card .sc-story-text {
  background: rgba(108,92,231,.06);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: .95rem;
  line-height: 1.8;
  color: var(--text);
  border-left: 4px solid var(--story);
}
.story-grid-btn {
  display:block; width:100%; margin-top:20px; padding:13px; border:none; border-radius:14px;
  background:var(--story); color:#fff; font-family:inherit; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .2s;
}
.story-grid-btn:hover { opacity:.9; transform:translateY(-2px); }

/* story list grid */
.story-list { margin-top:16px; }
.story-list-item {
  display:flex; align-items:center; gap:12px; padding:14px 16px; margin-bottom:8px;
  background:var(--card); border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,.05);
  cursor:pointer; transition:all .2s; border:2px solid transparent;
}
.story-list-item:hover { border-color:var(--story); transform:translateX(4px); }
.story-list-item .sli-num { width:32px;height:32px;border-radius:50%;background:var(--story);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;flex-shrink:0; }
.story-list-item .sli-info { flex:1; }
.story-list-item .sli-idiom { font-weight:900; font-size:1.05rem; }
.story-list-item .sli-meaning { font-size:.8rem; color:var(--text-light); margin-top:2px; }
.story-list-item .sli-arrow { color:var(--text-light); font-size:1.2rem; }

/* ANIMATIONS */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes confetti-fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
.confetti-piece { position:fixed; width:10px; height:10px; top:0; z-index:99; animation:confetti-fall linear forwards; pointer-events:none; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="deco deco-1"></div>
<div class="deco deco-2"></div>
<div class="deco deco-3"></div>

<div class="container">
  <!-- START -->
  <div id="startScreen" class="start-screen">
    <span class="mascot">📚</span>
    <h1>成語小達人</h1>
    <p class="subtitle">三年級成語大挑戰！你準備好了嗎？</p>
    <div class="name-input-area">
      <label for="playerName">👤 請輸入你的名字</label>
      <input type="text" id="playerName" class="name-input" placeholder="例如：小明" maxlength="10" autocomplete="off">
    </div>
    <div class="mode-select">
      <button class="mode-btn primary" id="btnMeaning" onclick="startQuiz('meaning')" disabled>📝 看解釋選成語</button>
      <button class="mode-btn secondary" id="btnFill" onclick="startQuiz('fill')" disabled>✏️ 成語填空題</button>
      <div class="divider">或</div>
      <button class="mode-btn story-mode" onclick="showStoryList()">📖 成語故事圖鑑</button>
      <button class="mode-btn ghost" onclick="showLeaderboard()">🏆 查看排行榜</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quizArea" class="hidden">
    <button class="back-home-btn" onclick="showExitConfirm()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>回首頁
    </button>
    <div id="exitConfirm" class="overlay hidden">
      <div class="overlay-box">
        <p>確定要回首頁嗎？<br>目前的測驗進度不會保留喔！</p>
        <div class="overlay-actions">
          <button class="ov-btn cancel" onclick="hideExitConfirm()">繼續作答</button>
          <button class="ov-btn confirm" onclick="goHome()">回首頁</button>
        </div>
      </div>
    </div>
    <div class="progress-area">
      <div class="progress-info">
        <span id="progressLabel">第 1 題 / 共 10 題</span>
        <span class="score-badge" id="scoreBadge">⭐ 0</span>
      </div>
      <span class="player-tag" id="playerTag"></span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="result-screen hidden"></div>
  <!-- LEADERBOARD -->
  <div id="leaderboardScreen" class="leaderboard-screen hidden"></div>
  <!-- STORY -->
  <div id="storyScreen" class="story-screen hidden"></div>

  <!-- CLEAR CONFIRM -->
  <div id="clearConfirm" class="overlay hidden">
    <div class="overlay-box">
      <p>確定要清除所有排行榜紀錄嗎？<br>這個動作無法復原！</p>
      <div class="overlay-actions">
        <button class="ov-btn cancel" onclick="document.getElementById('clearConfirm').classList.add('hidden')">取消</button>
        <button class="ov-btn confirm" onclick="clearLeaderboard()">確定清除</button>
      </div>
    </div>
  </div>
</div>

<script>
var ALL_IDIOMS = [
  {
    idiom:"初出茅廬",
    meaning:"比喻剛開始做事，還沒有經驗",
    example:"他______，很多事情還在學習中。",
    story:"三國時代，諸葛亮住在茅草屋裡讀書。劉備三次親自去拜訪他，請他出山幫忙。諸葛亮答應後，第一次帶兵打仗就大獲全勝，讓所有人刮目相看。後來大家就用「初出茅廬」形容一個人剛出來做事、還缺乏經驗的樣子。"
  },
  {
    idiom:"投機取巧",
    meaning:"用不正當的方法偷懶，想走捷徑",
    example:"做功課不能______，要自己認真寫。",
    story:"從前有個木匠接了一個蓋房子的工作。他為了省錢，偷偷把好木頭換成便宜的爛木頭，以為沒人會發現。結果房子蓋好沒多久就塌了，他也因此失去了所有人的信任。這個故事告訴我們，做事不能「投機取巧」，貪快反而會害了自己。"
  },
  {
    idiom:"禮尚往來",
    meaning:"別人對你好，你也應該對別人好",
    example:"他送我生日禮物，______，我也要送他一份。",
    story:"這個成語出自古書《禮記》。古時候的人非常重視禮節，認為收到別人的禮物或好意，一定要回報對方。就像過年的時候，鄰居送你橘子，你也應該回送一些糖果，這樣大家的感情才會越來越好。"
  },
  {
    idiom:"耳濡目染",
    meaning:"經常看到聽到，不知不覺就受到影響",
    example:"他從小在音樂家庭長大，______之下也學會了彈琴。",
    story:"「濡」是沾濕的意思，「染」是染上顏色。耳朵常常聽到、眼睛常常看到，就像布放在染缸旁邊，不知不覺就被染上了顏色。比如一個小孩從小看爸媽做菜，長大後不用特別學，自然就會煮出好吃的料理。"
  },
  {
    idiom:"文質彬彬",
    meaning:"形容一個人有禮貌、很有氣質的樣子",
    example:"新來的老師說話輕聲細語，看起來______。",
    story:"孔子曾經說：「如果一個人只有內在的好品德，但外表粗魯，就像沒開化的野人；如果只注重外表打扮，卻沒有真才實學，就會顯得虛假。只有內在和外在搭配得剛剛好，才稱得上是真正的君子。」這就是「文質彬彬」的由來。"
  },
  {
    idiom:"雕蟲小技",
    meaning:"比喻很小的本領，不值得一提",
    example:"這點小把戲只是______，不算什麼。",
    story:"古時候有一種特別的書法叫做「蟲書」，字體彎彎曲曲像蟲子一樣。雖然寫起來很漂亮，但是學者們覺得這只是一種小技巧，沒有什麼實際用處。後來「雕蟲小技」就被用來形容不重要的小本領。"
  },
  {
    idiom:"目光如豆",

var quizMode = '', playerName = '', questions = [], currentQ = 0, score = 0, answered = false, results = [];
var storyIndex = 0;

// NAME INPUT
var nameInput = document.getElementById('playerName');
var btnMeaning = document.getElementById('btnMeaning');
var btnFill = document.getElementById('btnFill');
var savedName = localStorage.getItem('idiom_last_name') || '';
if (savedName) { nameInput.value = savedName; updateButtons(); }
nameInput.addEventListener('input', updateButtons);
function updateButtons() {
  var hasName = nameInput.value.trim().length > 0;
  btnMeaning.disabled = !hasName;
  btnFill.disabled = !hasName;
}

// UTILS
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function hideAll() {
  var ids = ['startScreen','quizArea','resultScreen','leaderboardScreen','storyScreen'];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).classList.add('hidden');
}

// QUIZ
function startQuiz(mode) {
  playerName = nameInput.value.trim();
  if (!playerName) return;
  localStorage.setItem('idiom_last_name', playerName);
  quizMode = mode;
  questions = shuffle(ALL_IDIOMS).slice(0, 10);
  currentQ = 0; score = 0; results = []; answered = false;
  hideAll();
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('playerTag').textContent = '👤 ' + playerName;
  renderQuestion();
}
function getDistractors(correct, count) {
  return shuffle(ALL_IDIOMS.filter(function(i) { return i.idiom !== correct.idiom; })).slice(0, count);
}
function renderQuestion() {
  answered = false;
  var q = questions[currentQ];
  var options = shuffle([q].concat(getDistractors(q, 3)));
  document.getElementById('progressLabel').textContent = '第 ' + (currentQ+1) + ' 題 / 共 ' + questions.length + ' 題';
  document.getElementById('scoreBadge').textContent = '⭐ ' + score;
  document.getElementById('progressFill').style.width = (currentQ / questions.length * 100) + '%';
  var html = '<span class="q-number">第 ' + (currentQ+1) + ' 題</span>';
  if (quizMode === 'meaning') {
    html += '<div class="q-text">「' + q.meaning + '」<br>這是哪一個成語呢？</div>';
  } else {
    html += '<div class="q-text">' + q.example.replace('______', '<span class="blank">？？？？</span>') + '</div>';
  }
  html += '<div class="options">';
  for (var i = 0; i < options.length; i++) {
    html += '<button class="opt-btn" data-idiom="' + options[i].idiom + '" onclick="selectAnswer(this,\'' + q.idiom + '\')">' + options[i].idiom + '</button>';
  }
  html += '</div><div id="feedback" class="hidden"></div>';
  html += '<button id="nextBtn" class="next-btn hidden" onclick="nextQuestion()">下一題 ➜</button>';
  var card = document.getElementById('questionCard');
  card.innerHTML = html;
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'fadeUp .4s ease';
}
function selectAnswer(btn, correctIdiom) {
  if (answered) return;
  answered = true;
  var selected = btn.getAttribute('data-idiom');
  var isCorrect = selected === correctIdiom;
  var q = questions[currentQ];
  var allBtns = document.querySelectorAll('.opt-btn');
  for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.add('disabled');
  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    document.getElementById('scoreBadge').textContent = '⭐ ' + score;
  } else {
    btn.classList.add('wrong');
    for (var i = 0; i < allBtns.length; i++) {
      if (allBtns[i].getAttribute('data-idiom') === correctIdiom) allBtns[i].classList.add('show-answer');
    }
  }
  results.push({ idiom: q.idiom, meaning: q.meaning, story: q.story, correct: isCorrect });
  var fb = document.getElementById('feedback');
  fb.classList.remove('hidden','correct','wrong');
  if (isCorrect) {
    fb.classList.add('correct');
    var cheers = ['太棒了！🎉','答對了！好厲害！✨','正確！你好聰明！💪','完全正確！🌟'];
    fb.innerHTML = '<span class="fb-icon">✅</span>' + cheers[Math.floor(Math.random()*cheers.length)] +
      '<br>「<strong>' + q.idiom + '</strong>」：' + q.meaning +
      '<div class="fb-story"><strong>📖 故事：</strong>' + q.story + '</div>';
  } else {
    fb.classList.add('wrong');
    fb.innerHTML = '<span class="fb-icon">❌</span>再想想喔！正確答案是「<strong>' + correctIdiom + '</strong>」<br>' + q.meaning +
      '<div class="fb-story"><strong>📖 故事：</strong>' + q.story + '</div>';
  }
  var nb = document.getElementById('nextBtn');
  nb.classList.remove('hidden');
  nb.textContent = currentQ < questions.length - 1 ? '下一題 ➜' : '看結果 🏆';
}
function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showResult(); else renderQuestion();
}

// RESULT
function showResult() {
  saveScore(playerName, score, questions.length, quizMode);
  hideAll();
  var rs = document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  var pct = score / questions.length;
  var emoji, title;
  if (pct === 1) { emoji='🏆'; title='滿分！超級厲害！'; }
  else if (pct >= .8) { emoji='🌟'; title='好棒棒！'; }
  else if (pct >= .6) { emoji='💪'; title='不錯喔！'; }
  else if (pct >= .4) { emoji='📖'; title='加油！'; }
  else { emoji='🤗'; title='沒關係！'; }
  var starCount = Math.max(1, Math.round(pct * 5));
  var stars = '';
  for (var i = 0; i < starCount; i++) stars += '⭐';
  for (var i = 0; i < 5 - starCount; i++) stars += '☆';
  var html = '<span class="big-emoji">' + emoji + '</span>' +
    '<h2>' + playerName + '，' + title + '</h2>' +
    '<div class="star-row">' + stars + '</div>' +
    '<p class="score-text">答對 <strong>' + score + '</strong> / ' + questions.length + ' 題</p>' +
    '<div class="mode-select">' +
      '<button class="mode-btn primary" onclick="startQuiz(\'meaning\')">📝 再玩一次（看解釋選成語）</button>' +
      '<button class="mode-btn secondary" onclick="startQuiz(\'fill\')">✏️ 再玩一次（成語填空題）</button>' +
      '<button class="mode-btn story-mode" onclick="showStoryList()">📖 成語故事圖鑑</button>' +
      '<button class="mode-btn ghost" onclick="showLeaderboard()">🏆 查看排行榜</button>' +
      '<button class="mode-btn" style="background:#DFE6E9;color:var(--text);" onclick="goHome()">🏠 回首頁</button>' +
    '</div>';
  var wrongs = results.filter(function(r) { return !r.correct; });
  if (wrongs.length > 0) {
    html += '<div class="review-section"><h3>📝 需要複習的成語：</h3>';
    for (var i = 0; i < wrongs.length; i++) {
      html += '<div class="review-item"><span class="ri-icon">📌</span><div class="ri-text"><strong>' + wrongs[i].idiom + '</strong>：' + wrongs[i].meaning + '</div></div>';
    }
    html += '</div>';
  }
  rs.innerHTML = html;
  if (pct >= .8) spawnConfetti();
}

// LEADERBOARD
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('idiom_leaderboard') || '[]'); }
  catch(e) { return []; }
}
function saveScore(name, sc, total, mode) {
  var lb = getLeaderboard();
  var modeLabel = mode === 'meaning' ? '解釋選成語' : '成語填空';
  var now = new Date();
  var dateStr = (now.getMonth()+1) + '/' + now.getDate() + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  lb.push({ name: name, score: sc, total: total, mode: modeLabel, date: dateStr, pct: sc/total });
  lb.sort(function(a,b) { return b.pct - a.pct || b.score - a.score; });
  localStorage.setItem('idiom_leaderboard', JSON.stringify(lb.slice(0, 50)));
}
function showLeaderboard() {
  hideAll();
  var screen = document.getElementById('leaderboardScreen');
  screen.classList.remove('hidden');
  var lb = getLeaderboard();
  var html = '<h2>🏆 排行榜</h2><p class="lb-subtitle">看看誰是成語小達人！</p>';
  if (lb.length === 0) {
    html += '<div class="lb-empty"><span class="lb-empty-icon">📭</span>還沒有紀錄喔！<br>快去挑戰吧！</div>';
  } else {
    for (var i = 0; i < Math.min(lb.length, 20); i++) {
      var rank = i + 1;
      var rc = rank===1?'r1':rank===2?'r2':rank===3?'r3':'rn';
      var tc = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
      var medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
      html += '<div class="lb-row '+tc+'"><div class="lb-rank '+rc+'">'+medal+'</div>' +
        '<div class="lb-info"><div class="lb-name">'+lb[i].name+'</div><div class="lb-detail">'+lb[i].mode+'｜'+lb[i].date+'</div></div>' +
        '<div class="lb-score">'+lb[i].score+'<small> / '+lb[i].total+'</small></div></div>';
    }
  }
  html += '<div class="lb-actions"><button class="mode-btn primary" onclick="goHome()">🏠 回首頁</button>' +
    (lb.length > 0 ? '<button class="clear-lb-btn" onclick="document.getElementById(\'clearConfirm\').classList.remove(\'hidden\')">🗑️ 清除所有紀錄</button>' : '') + '</div>';
  screen.innerHTML = html;
}
function clearLeaderboard() {
  localStorage.removeItem('idiom_leaderboard');
  document.getElementById('clearConfirm').classList.add('hidden');
  showLeaderboard();
}

    '<button class="story-nav-btn" onclick="nextStory()" '+(storyIndex===ALL_IDIOMS.length-1?'disabled':'')+'>' +
      '<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>' +
  '</div>';

  // card
  html += '<div class="story-card">' +
    '<div class="sc-idiom">'+item.idiom+'</div>' +
    '<div class="sc-section"><span class="sc-label meaning-label">💡 意思</span><div class="sc-content">'+item.meaning+'</div></div>' +
    '<div class="sc-section"><span class="sc-label story-label">📖 故事</span><div class="sc-story-text">'+item.story+'</div></div>' +
    '<div class="sc-section"><span class="sc-label example-label">✏️ 例句</span><div class="sc-content">'+item.example.replace('______','<strong style="color:var(--primary)">'+item.idiom+'</strong>')+'</div></div>' +
  '</div>';

  html += '<button class="story-grid-btn" onclick="showStoryList()">📋 回到列表</button>';

  screen.innerHTML = html;
  screen.style.animation = 'none'; screen.offsetHeight; screen.style.animation = 'fadeUp .35s ease';
  window.scrollTo(0,0);
}

function prevStory() {
  if (storyIndex > 0) { storyIndex--; renderStoryDetail(); }
}
function nextStory() {
  if (storyIndex < ALL_IDIOMS.length - 1) { storyIndex++; renderStoryDetail(); }
}

// NAV
function goHome() {
  hideExitConfirm();
  hideAll();
  document.getElementById('startScreen').classList.remove('hidden');
  updateButtons();
}
function showExitConfirm() { document.getElementById('exitConfirm').classList.remove('hidden'); }
function hideExitConfirm() { document.getElementById('exitConfirm').classList.add('hidden'); }

// CONFETTI
function spawnConfetti() {
  var colors = ['#FF6B35','#4ECDC4','#FFE66D','#E84393','#6C5CE7','#00B894'];
  for (var i = 0; i < 50; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (6+Math.random()*8)+'px';
    el.style.height = (6+Math.random()*8)+'px';
    el.style.borderRadius = Math.random()>.5?'50%':'2px';
    el.style.animationDuration = (2+Math.random()*3)+'s';
    el.style.animationDelay = Math.random()*2+'s';
    document.body.appendChild(el);
    (function(e){ setTimeout(function(){ e.remove(); }, 6000); })(el);
  }
}
</script>
</body>
